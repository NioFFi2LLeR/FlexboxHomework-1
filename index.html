<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Homework 1</title>
</head>
<body>
    
    <div class="container">
        <div class="name">
            <h1 class="name">Лучшие товары</h1>
        </div>
        
        <div class="card adidas">
            <img class="card_image" src="adidas-originals-gazelle.jpg" alt="">

            <div class="card_bottom">    
                <div class="price">9 900P</div>
    
                <div class="sneakers_name">
                    <p>GAZELE</p>
                    <p>adidas Original</p>
                </div>
            </div>
        </div>

        <div class="card balance">
            <img class="card_image" src="new-balance-x-race.jpg" alt="">

            <div class="card_bottom">
                <div class="price">14 990P</div>
    
                <div class="sneakers_name">
                    <p>X-RACE</p>
                    <p>New Balance</p>
                </div>
            </div>
        </div>

        <div class="card Jordan">
            <img class="card_image" src="jordan-1-mid-se.jpg" alt="">
            
            <div class="card_bottom">
                <div class="price">16 500P</div>

                <div class="sneakers_name">
                    <p>1 MID SE</p>
                    <p>Jordan</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
